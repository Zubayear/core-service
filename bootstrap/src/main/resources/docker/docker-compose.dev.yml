services:
  postgres:
    image: postgres:16-alpine
    container_name: core_service_postgres_dev
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: jpbsL4L18kWrT
      POSTGRES_DB: core_service_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dev_user -d core_service_dev" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
